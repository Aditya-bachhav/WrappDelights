{% extends "dashboard/_admin_base.html" %}
{% block title %}Edit — {{ section.title }}{% endblock %}
{% block page_title %}Edit Section{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <div class="breadcrumb"><a href="{% url 'dashboard' %}">Dashboard</a> / <a href="{% url 'dashboard_sections' %}">Sections</a> / Edit</div>
    <h1>{{ section.title }}</h1>
  </div>
  <a href="{% url 'dashboard_delete_section' section.id %}" class="btn btn-danger">Delete</a>
</div>

<form method="post" style="max-width:560px">
  {% csrf_token %}
  <div class="card">
    <div class="form-section">
      <div class="form-section-title">Section Info</div>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label">Title *</label>
        <input class="form-input" name="title" required value="{{ section.title }}">
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label">Section Type</label>
        <select class="form-select" name="section_type">
          {% for val, label in section_choices %}<option value="{{ val }}" {% if section.section_type == val %}selected{% endif %}>{{ label }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label">Subtitle</label>
        <textarea class="form-textarea" name="subtitle" rows="2">{{ section.subtitle }}</textarea>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label">Position</label>
        <input class="form-input" type="number" name="position" value="{{ section.position }}" min="0">
      </div>
      <label class="form-check"><input type="checkbox" name="is_active" {% if section.is_active %}checked{% endif %}> Active</label>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{% url 'dashboard_sections' %}" class="btn btn-outline">Cancel</a>
    </div>
  </div>
</form>
{% endblock %}
