{% extends "dashboard/_admin_base.html" %}
{% block title %}Add Category{% endblock %}
{% block page_title %}Add Category{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <div class="breadcrumb"><a href="{% url 'dashboard' %}">Dashboard</a> / <a href="{% url 'dashboard_categories' %}">Categories</a> / Add</div>
    <h1>Add Category</h1>
  </div>
</div>

<form method="post" style="max-width:560px">
  {% csrf_token %}
  <div class="card">
    <div class="form-section">
      <div class="form-section-title">Category Info</div>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label">Name *</label>
        <input class="form-input" name="name" required placeholder="e.g. Corporate Gifting">
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label">Display Position</label>
        <input class="form-input" type="number" name="position" value="0" min="0">
        <span class="form-hint">Lower number = shown first</span>
      </div>
      <label class="form-check"><input type="checkbox" name="is_active" checked> Active (visible to users)</label>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Create Category</button>
      <a href="{% url 'dashboard_categories' %}" class="btn btn-outline">Cancel</a>
    </div>
  </div>
</form>
{% endblock %}
