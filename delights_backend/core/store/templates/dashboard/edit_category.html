{% extends "dashboard/_admin_base.html" %}
{% block title %}Edit — {{ category.name }}{% endblock %}
{% block page_title %}Edit Category{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <div class="breadcrumb"><a href="{% url 'dashboard' %}">Dashboard</a> / <a href="{% url 'dashboard_categories' %}">Categories</a> / Edit</div>
    <h1>{{ category.name }}</h1>
  </div>
  <a href="{% url 'dashboard_delete_category' category.id %}" class="btn btn-danger">Delete</a>
</div>

<form method="post" style="max-width:560px">
  {% csrf_token %}
  <div class="card">
    <div class="form-section">
      <div class="form-section-title">Category Info</div>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label">Name *</label>
        <input class="form-input" name="name" required value="{{ category.name }}">
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label">Display Position</label>
        <input class="form-input" type="number" name="position" value="{{ category.position }}" min="0">
      </div>
      <label class="form-check"><input type="checkbox" name="is_active" {% if category.is_active %}checked{% endif %}> Active</label>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{% url 'dashboard_categories' %}" class="btn btn-outline">Cancel</a>
    </div>
  </div>
</form>
{% endblock %}
